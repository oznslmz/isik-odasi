<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Işık Odası</title>
<meta name="theme-color" content="#0d1120">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Işık Odası">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<style>
  :root{
    --bg:#0d1120; --panel:#161d33; --panel-edge:#232e52; --grid:#222c50;
    --ink:#efe7d3; --ink-dim:#8f97b5;
    --brass:#c9a227; --brass-hi:#f0d060;
    --wall:#0a0e1a; --wall-edge:#2e3a63;
    --amber:#ffd88a; --amber-glow:#ff9d2e; --amber-core:#fff3d6;
    --red:#ff6b6b; --red-glow:#ff3232;
    --blue:#6bb3ff; --blue-glow:#3b82ff;
    --teal:#3fd4c4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:radial-gradient(120% 90% at 50% 0%, #131a30 0%, var(--bg) 60%);min-height:100vh;color:var(--ink);font-family:'DM Sans',system-ui,-apple-system,sans-serif;}
  .wrap{max-width:480px;margin:0 auto;padding:16px 12px 32px;display:flex;flex-direction:column;align-items:center;}
  header{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:24px;letter-spacing:.5px;margin:0;}
  h1 .spark{color:var(--brass-hi);}
  .lvl{font-size:13px;color:var(--ink-dim);letter-spacing:.08em;text-transform:uppercase;}
  .hud{width:100%;display:flex;justify-content:space-between;align-items:center;gap:6px;margin:4px 0 10px;flex-wrap:wrap;}
  .hud-left{display:flex;gap:10px;align-items:center;}
  .moves{font-size:13.5px;color:var(--ink-dim);}
  .moves b{color:var(--ink);font-weight:600;}
  .hud-right{display:flex;gap:6px;}
  button{font-family:inherit;font-size:13.5px;border:1px solid var(--panel-edge);background:var(--panel);color:var(--ink);padding:7px 12px;border-radius:10px;cursor:pointer;transition:border-color .15s, transform .1s;}
  button:hover{border-color:var(--brass);}
  button:active{transform:scale(.96);}
  button.primary{background:linear-gradient(180deg,#e7c14a,#c9a227);color:#231c05;border:none;font-weight:600;padding:10px 22px;font-size:15px;}
  button.icon{padding:7px 10px;}
  .board-frame{width:100%;background:var(--panel);border:1px solid var(--panel-edge);border-radius:18px;padding:10px;box-shadow:0 12px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);}
  svg{display:block;width:100%;height:auto;border-radius:10px;touch-action:none;}
  .hint-text{margin-top:11px;font-size:13px;color:var(--ink-dim);text-align:center;line-height:1.5;min-height:20px;}
  .dots{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;justify-content:center;}
  .dot{width:22px;height:22px;border-radius:8px;background:var(--panel);border:1px solid var(--panel-edge);color:var(--ink-dim);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .dot.done{border-color:var(--brass);color:var(--brass-hi);}
  .dot.now{background:#243055;color:var(--amber);border-color:var(--amber-glow);box-shadow:0 0 8px rgba(255,157,46,.35);}
  .mirror-cell,.splitter-cell{cursor:pointer;}
  .movable{cursor:grab;}
  .overlay{position:fixed;inset:0;background:rgba(8,11,22,.72);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;z-index:10;}
  .overlay.show{opacity:1;pointer-events:auto;}
  .card{background:var(--panel);border:1px solid var(--brass);border-radius:18px;padding:26px 30px;text-align:center;max-width:330px;box-shadow:0 0 60px rgba(255,157,46,.15);animation:pop .3s ease;}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .card h2{font-family:'Fraunces',Georgia,serif;font-weight:600;margin:0 0 4px;font-size:23px;color:var(--brass-hi);}
  .stars{font-size:30px;letter-spacing:6px;margin:6px 0 4px;color:var(--brass-hi);text-shadow:0 0 14px rgba(255,157,46,.5);}
  .stars .off{color:#33406b;text-shadow:none;}
  .card p{margin:0 0 16px;color:var(--ink-dim);font-size:14px;}
  /* editor */
  .toolbar{display:none;width:100%;margin:8px 0 2px;gap:5px;flex-wrap:wrap;justify-content:center;}
  .toolbar.show{display:flex;}
  .tool{font-size:12.5px;padding:6px 10px;border-radius:8px;}
  .tool.sel{border-color:var(--amber-glow);background:#243055;color:var(--amber);}
  .ed-actions{display:none;width:100%;margin-top:10px;gap:6px;justify-content:center;flex-wrap:wrap;}
  .ed-actions.show{display:flex;}
  textarea{width:100%;height:110px;background:#0e1428;color:var(--ink);border:1px solid var(--panel-edge);border-radius:10px;padding:8px;font-size:12px;font-family:monospace;resize:vertical;}
  .io-card{max-width:360px;width:90vw;text-align:left;}
  .io-card h2{font-size:19px;}
  .io-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
  @keyframes beamFlow{to{stroke-dashoffset:-28;}}
  .beam-core{stroke-dasharray:10 4;animation:beamFlow .5s linear infinite;}
  @keyframes crystalPulse{0%,100%{opacity:.5}50%{opacity:1}}
  .lit-glow{animation:crystalPulse 1.1s ease-in-out infinite;}
  @keyframes hintPulse{0%,100%{stroke-opacity:.2}50%{stroke-opacity:1}}
  .hint-ring{animation:hintPulse .7s ease-in-out 4;}
  @media (prefers-reduced-motion: reduce){.beam-core,.lit-glow,.hint-ring{animation:none;}}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <header>
    <h1>Işık Odası<span class="spark"> ✦</span></h1>
    <div class="lvl" id="lvlLabel">Bölüm 1/9</div>
  </header>

  <div class="hud">
    <div class="hud-left">
      <div class="moves">Hamle: <b id="moveCount">0</b></div>
      <div class="moves" id="parLabel"></div>
    </div>
    <div class="hud-right">
      <button id="hintBtn">İpucu <span id="hintLeft">3</span></button>
      <button id="resetBtn">Baştan</button>
      <button class="icon" id="soundBtn">🔊</button>
      <button class="icon" id="editorBtn" title="Seviye Editörü">🛠️</button>
    </div>
  </div>

  <div class="toolbar" id="toolbar"></div>

  <div class="board-frame">
    <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="ed-actions" id="edActions">
    <button id="testBtn" class="primary">▶ Test Et</button>
    <button id="exportBtn">Kodu Al</button>
    <button id="importBtn">Kod Yükle</button>
    <button id="clearBtn">Temizle</button>
    <button id="backBtn">← Oyuna Dön</button>
  </div>

  <div class="hint-text" id="hintText">Aynalara dokun: yönü değişir. Noktalı aynaları sürükleyerek taşıyabilirsin.</div>
  <div class="dots" id="dots"></div>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <h2 id="winTitle">Bölüm tamamlandı</h2>
    <div class="stars" id="winStars"></div>
    <p id="winText"></p>
    <button class="primary" id="nextBtn">Sonraki Bölüm</button>
  </div>
</div>

<div class="overlay" id="ioOverlay">
  <div class="card io-card">
    <h2 id="ioTitle">Bölüm Kodu</h2>
    <textarea id="ioText" spellcheck="false"></textarea>
    <div class="io-btns">
      <button id="ioCopy">Kopyala</button>
      <button id="ioLoad" class="primary" style="display:none">Yükle</button>
      <button id="ioClose">Kapat</button>
    </div>
  </div>
</div>

<script>
/* ============ sabitler ============ */
const N = 7, S = 64, W = N*S;
const DIRS = { R:[1,0], L:[-1,0], U:[0,-1], D:[0,1] };
const DIR_ORDER = ['R','D','L','U'];
const REFLECT = {
  '/':  { R:'U', L:'D', U:'R', D:'L' },
  '\\': { R:'D', L:'U', U:'L', D:'R' }
};
const BEAM_COLORS = {
  amber:{ main:'#ffd88a', glow:'#ff9d2e', core:'#fff3d6' },
  red:  { main:'#ff6b6b', glow:'#ff3232', core:'#ffd6d6' },
  blue: { main:'#6bb3ff', glow:'#3b82ff', core:'#d9ebff' }
};
const CRYSTAL_COLORS = { any:'#3fd4c4', red:'#ff6b6b', blue:'#6bb3ff' };

/* ============ bölümler ============
   pieces: k = 'm' ayna | 's' bölücü | 'f' filtre
   o = '/' | '\\'   c = renk   mv = taşınabilir
   sol = çözüm ('/' , '\\' veya {x,y,o})           */
const LEVELS = [
  { name:'İlk Işık', par:1, emitter:{x:0,y:3,dir:'R'},
    crystals:[{x:4,y:0,c:'any'}], walls:[],
    pieces:[ {k:'m',x:4,y:3,o:'\\',sol:'/'} ] },

  { name:'Çift Sekme', par:2, emitter:{x:0,y:5,dir:'R'},
    crystals:[{x:6,y:1,c:'any'}], walls:[],
    pieces:[ {k:'m',x:2,y:5,o:'\\',sol:'/'}, {k:'m',x:2,y:1,o:'\\',sol:'/'} ] },

  { name:'Duvarın Ardı', par:3, emitter:{x:0,y:1,dir:'R'},
    crystals:[{x:5,y:0,c:'any'}], walls:[[4,1],[3,3]],
    pieces:[ {k:'m',x:2,y:1,o:'/',sol:'\\'}, {k:'m',x:2,y:5,o:'/',sol:'\\'}, {k:'m',x:5,y:5,o:'\\',sol:'/'} ] },

  { name:'Dolambaç', par:4, emitter:{x:3,y:6,dir:'U'},
    crystals:[{x:5,y:1,c:'any'}], walls:[[4,4],[6,0]],
    pieces:[ {k:'m',x:3,y:2,o:'/',sol:'\\'}, {k:'m',x:1,y:2,o:'\\',sol:'/'},
             {k:'m',x:1,y:5,o:'/',sol:'\\'}, {k:'m',x:5,y:5,o:'\\',sol:'/'},
             {k:'m',x:6,y:3,o:'/',sol:null}, {k:'m',x:2,y:0,o:'\\',sol:null} ] },

  { name:'Sarmal', par:3, emitter:{x:0,y:0,dir:'R'},
    crystals:[{x:1,y:5,c:'any'}], walls:[[4,0],[3,2],[6,4]],
    pieces:[ {k:'m',x:2,y:0,o:'/',sol:'\\'}, {k:'m',x:2,y:3,o:'\\',sol:'\\'},
             {k:'m',x:5,y:3,o:'/',sol:'\\'}, {k:'m',x:5,y:5,o:'\\',sol:'/'} ] },

  { name:'Ustalık', par:4, emitter:{x:6,y:3,dir:'L'},
    crystals:[{x:6,y:1,c:'any'}], walls:[[4,5],[2,2]],
    pieces:[ {k:'m',x:3,y:3,o:'\\',sol:'/'}, {k:'m',x:3,y:6,o:'\\',sol:'/'},
             {k:'m',x:0,y:6,o:'/',sol:'\\'}, {k:'m',x:0,y:1,o:'\\',sol:'/'},
             {k:'m',x:5,y:4,o:'/',sol:null}, {k:'m',x:1,y:3,o:'\\',sol:null} ] },

  { name:'Bölünen Işık', par:1, emitter:{x:0,y:3,dir:'R'},
    crystals:[{x:6,y:3,c:'any'},{x:3,y:0,c:'any'}], walls:[],
    pieces:[ {k:'s',x:3,y:3,o:'\\',sol:'/'} ] },

  { name:'Renk Odası', par:2, emitter:{x:0,y:3,dir:'R'},
    crystals:[{x:6,y:3,c:'red'},{x:6,y:6,c:'blue'}], walls:[],
    pieces:[ {k:'s',x:2,y:3,o:'/',sol:'\\'},
             {k:'f',x:4,y:3,c:'red'}, {k:'f',x:2,y:5,c:'blue'},
             {k:'m',x:2,y:6,o:'/',sol:'\\'} ] },

  { name:'Büyük Final', par:4, emitter:{x:0,y:0,dir:'R'},
    crystals:[{x:0,y:4,c:'any'},{x:6,y:2,c:'any'}], walls:[[2,6],[6,0]],
    pieces:[ {k:'m',x:5,y:5,o:'/',mv:1,sol:{x:4,y:0,o:'\\'}},
             {k:'s',x:4,y:2,o:'/',sol:'\\'},
             {k:'m',x:4,y:4,o:'\\',sol:'/'} ] }
];

/* ============ durum ============ */
let mode = 'play';            // play | editor | test
let levelIdx = 0;
let cur = null;               // aktif bölümün canlı kopyası
let moves = 0, won = false, hintsLeft = 3;
let bestStars = LEVELS.map(()=>0);
// ilerlemeyi hatırla (gerçek uygulama/PWA'da çalışır; desteklenmeyen ortamda sessizce atlanır)
try{
  const saved = JSON.parse(localStorage.getItem('isikOdasiStars')||'null');
  if(Array.isArray(saved)) saved.forEach((s,i)=>{ if(i<bestStars.length) bestStars[i]=s|0; });
}catch(e){}
function saveProgress(){ try{ localStorage.setItem('isikOdasiStars', JSON.stringify(bestStars)); }catch(e){} }
let soundOn = true;
let hintFlash = null;         // ipucu ile düzeltilen taş
let edLevel = { emitter:null, crystals:[], walls:[], pieces:[] };
let edTool = 'mirror';
const board = document.getElementById('board');
const $ = id => document.getElementById(id);

const clone = o => JSON.parse(JSON.stringify(o));

/* ============ ses ============ */
let actx = null;
function tone(freq, dur=0.07, type='square', vol=0.05, when=0){
  if(!soundOn) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const t = actx.currentTime + when;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
const sTap  = ()=>tone(430, .06);
const sMove = ()=>tone(290, .08, 'triangle', .06);
const sHint = ()=>{tone(660,.09,'sine',.06); tone(520,.12,'sine',.05,.09);};
const sWin  = ()=>{[523,659,784,1046].forEach((f,i)=>tone(f,.16,'sine',.07,i*0.11));};

/* ============ yardımcılar ============ */
function pieceAt(x,y){ return cur.pieces.find(p=>p.x===x&&p.y===y); }
function cellAt(x,y){
  if(x<0||y<0||x>=N||y>=N) return {type:'edge'};
  if(cur.walls.some(w=>w[0]===x&&w[1]===y)) return {type:'wall'};
  if(cur.emitter && cur.emitter.x===x && cur.emitter.y===y) return {type:'emitter'};
  const ci = cur.crystals.findIndex(c=>c.x===x&&c.y===y);
  if(ci>=0) return {type:'crystal', ci};
  const p = pieceAt(x,y);
  if(p) return {type:p.k, p};
  return {type:'empty'};
}
function cellFree(x,y){
  return x>=0&&y>=0&&x<N&&y<N && cellAt(x,y).type==='empty';
}

/* ============ ışın izleme ============ */
function traceBeams(){
  const segs = [], lit = cur.crystals.map(()=>false);
  if(!cur.emitter) return {segs, lit};
  const queue = [{x:cur.emitter.x, y:cur.emitter.y, dir:cur.emitter.dir, color:'amber'}];
  const seen = new Set();
  let guard = 0;
  while(queue.length && guard++ < 60){
    let {x,y,dir,color} = queue.shift();
    let pts = [[x*S+S/2, y*S+S/2]];
    for(let step=0; step<300; step++){
      const key = x+','+y+','+dir+','+color;
      if(seen.has(key)) break;
      seen.add(key);
      const [dx,dy] = DIRS[dir];
      x+=dx; y+=dy;
      const c = cellAt(x,y);
      if(c.type==='edge'){
        pts.push([Math.max(0,Math.min(W,x*S+S/2)), Math.max(0,Math.min(W,y*S+S/2))]);
        break;
      }
      if(c.type==='wall' || c.type==='emitter'){
        pts.push([x*S+S/2-dx*S/2, y*S+S/2-dy*S/2]);
        break;
      }
      if(c.type==='crystal'){
        pts.push([x*S+S/2, y*S+S/2]);
        const need = cur.crystals[c.ci].c;
        if(need==='any' || need===color) lit[c.ci]=true;
        break;
      }
      if(c.type==='f'){ // filtre: geçer, renk değişir
        pts.push([x*S+S/2, y*S+S/2]);
        if(pts.length>1) segs.push({pts, color});
        pts = [[x*S+S/2, y*S+S/2]];
        color = c.p.c;
        continue;
      }
      if(c.type==='m'){
        pts.push([x*S+S/2, y*S+S/2]);
        dir = REFLECT[c.p.o][dir];
        continue;
      }
      if(c.type==='s'){ // bölücü: düz devam + yansıyan kopya
        pts.push([x*S+S/2, y*S+S/2]);
        queue.push({x, y, dir:REFLECT[c.p.o][dir], color});
        continue;
      }
    }
    if(pts.length>1) segs.push({pts, color});
  }
  return {segs, lit};
}

/* ============ çizim ============ */
function render(){
  const {segs, lit} = traceBeams();
  const allLit = cur.crystals.length>0 && lit.every(Boolean);
  let svg = `<defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d060"/><stop offset=".5" stop-color="#c9a227"/><stop offset="1" stop-color="#8a6d14"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="${W}" height="${W}" rx="10" fill="#101731"/>`;

  for(let i=1;i<N;i++){
    svg += `<line x1="${i*S}" y1="0" x2="${i*S}" y2="${W}" stroke="var(--grid)" stroke-width="1"/>
            <line x1="0" y1="${i*S}" x2="${W}" y2="${i*S}" stroke="var(--grid)" stroke-width="1"/>`;
  }

  for(const [wx,wy] of cur.walls){
    svg += `<rect x="${wx*S+4}" y="${wy*S+4}" width="${S-8}" height="${S-8}" rx="8" fill="var(--wall)" stroke="var(--wall-edge)" stroke-width="1.5"/>
    <line x1="${wx*S+14}" y1="${wy*S+S-14}" x2="${wx*S+S-14}" y2="${wy*S+14}" stroke="var(--wall-edge)" stroke-width="1" opacity=".5"/>`;
  }

  // ışınlar
  for(const seg of segs){
    const c = BEAM_COLORS[seg.color];
    const pt = seg.pts.map(p=>p.join(',')).join(' ');
    svg += `<polyline points="${pt}" fill="none" stroke="${c.glow}" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity=".33" filter="url(#glow)"/>
            <polyline points="${pt}" fill="none" stroke="${c.main}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline class="beam-core" points="${pt}" fill="none" stroke="${c.core}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>`;
  }

  // filtreler (mercekler)
  for(const p of cur.pieces.filter(p=>p.k==='f')){
    const cx = p.x*S+S/2, cy = p.y*S+S/2;
    const col = p.c==='red' ? 'var(--red)' : 'var(--blue)';
    svg += `<g ${mode==='editor'?'':'pointer-events="none"'}>
      <circle cx="${cx}" cy="${cy}" r="19" fill="${col}" opacity=".22"/>
      <circle cx="${cx}" cy="${cy}" r="19" fill="none" stroke="${col}" stroke-width="2.5" opacity=".85"/>
      <circle cx="${cx}" cy="${cy}" r="12" fill="none" stroke="${col}" stroke-width="1" opacity=".4"/>
    </g>`;
  }

  // kaynak
  if(cur.emitter){
    const e = cur.emitter, ang = {R:0,D:90,L:180,U:270}[e.dir];
    svg += `<g transform="translate(${e.x*S+S/2},${e.y*S+S/2}) rotate(${ang})">
      <circle r="18" fill="url(#brass)" stroke="#5c4a0e" stroke-width="2"/>
      <path d="M 10 -8 L 26 0 L 10 8 Z" fill="var(--amber-core)" filter="url(#glow)"/>
      <circle r="6" fill="var(--amber-core)"/>
    </g>`;
  }

  // kristaller
  cur.crystals.forEach((t,i)=>{
    const tx=t.x*S+S/2, ty=t.y*S+S/2, isLit=lit[i];
    const base = CRYSTAL_COLORS[t.c];
    const fill = isLit ? (t.c==='any'?'#ffcf5e':base) : base;
    const op = isLit ? 1 : .78;
    svg += `<g transform="translate(${tx},${ty})">
      ${isLit?`<circle class="lit-glow" r="24" fill="${fill}" opacity=".5" filter="url(#glow)"/>`:''}
      <path d="M 0 -19 L 14 0 L 0 19 L -14 0 Z" fill="${fill}" opacity="${op}" stroke="${isLit?'#fff3d6':'#0e1428'}" stroke-width="2" ${isLit?'filter="url(#glow)"':''}/>
      <path d="M 0 -19 L 5 0 L 0 19 L -5 0 Z" fill="rgba(255,255,255,.35)"/>
    </g>`;
  });

  // aynalar & bölücüler
  cur.pieces.forEach((p, idx)=>{
    if(p.k==='f') return;
    const mx=p.x*S, my=p.y*S;
    const line = p.o==='/'
      ? `x1="${mx+14}" y1="${my+S-14}" x2="${mx+S-14}" y2="${my+14}"`
      : `x1="${mx+14}" y1="${my+14}" x2="${mx+S-14}" y2="${my+S-14}"`;
    const flash = hintFlash===idx
      ? `<rect class="hint-ring" x="${mx+3}" y="${my+3}" width="${S-6}" height="${S-6}" rx="12" fill="none" stroke="var(--amber)" stroke-width="3"/>` : '';
    if(p.k==='m'){
      const border = p.mv ? `stroke-dasharray="5 4"` : '';
      svg += `<g class="mirror-cell ${p.mv?'movable':''}" data-idx="${idx}">
        <rect class="tile" x="${mx+5}" y="${my+5}" width="${S-10}" height="${S-10}" rx="10" fill="#1c2647" stroke="${p.mv?'var(--teal)':'var(--panel-edge)'}" stroke-width="1.5" ${border}/>
        <line ${line} stroke="url(#brass)" stroke-width="7" stroke-linecap="round"/>
        <line ${line} stroke="#fff8e0" stroke-width="1.6" stroke-linecap="round" opacity=".8"/>
        ${flash}</g>`;
    }else{ // bölücü: yarı geçirgen cam
      svg += `<g class="splitter-cell" data-idx="${idx}">
        <rect class="tile" x="${mx+5}" y="${my+5}" width="${S-10}" height="${S-10}" rx="10" fill="#16233f" stroke="#3b5a8c" stroke-width="1.5"/>
        <line ${line} stroke="#9fd8ff" stroke-width="6" stroke-linecap="round" opacity=".45"/>
        <line ${line} stroke="#e8f6ff" stroke-width="2" stroke-linecap="round" stroke-dasharray="7 5"/>
        ${flash}</g>`;
    }
  });

  board.setAttribute('viewBox', `0 0 ${W} ${W}`);
  board.innerHTML = svg;
  $('moveCount').textContent = moves;

  attachHandlers();

  if(mode!=='editor' && allLit && !won){
    won = true;
    sWin();
    setTimeout(showWin, 600);
  }
}

/* ============ etkileşim ============ */
function attachHandlers(){
  if(mode==='editor'){
    board.onpointerdown = editorTap;
    return;
  }
  board.onpointerdown = null;

  board.querySelectorAll('.splitter-cell, .mirror-cell:not(.movable)').forEach(g=>{
    g.addEventListener('click', ()=>{
      if(won) return;
      const p = cur.pieces[+g.dataset.idx];
      p.o = p.o==='/' ? '\\' : '/';
      moves++; hintFlash=null; sTap(); render();
    });
  });

  // taşınabilir aynalar: sürükle = taşı, dokun = döndür
  board.querySelectorAll('.mirror-cell.movable').forEach(g=>{
    g.addEventListener('pointerdown', ev=>{
      if(won) return;
      ev.preventDefault();
      const idx = +g.dataset.idx, p = cur.pieces[idx];
      const sx = ev.clientX, sy = ev.clientY;
      let lastX = sx, lastY = sy, dragged = false;
      const onMove = e=>{
        e.preventDefault();
        lastX = e.clientX; lastY = e.clientY;
        const rect = board.getBoundingClientRect();
        const scale = W/rect.width;
        const dx=(lastX-sx)*scale, dy=(lastY-sy)*scale;
        if(Math.abs(dx)>8||Math.abs(dy)>8) dragged=true;
        if(dragged) g.setAttribute('transform',`translate(${dx},${dy})`);
      };
      const finish = e=>{
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', finish);
        window.removeEventListener('pointercancel', finish);
        if(e && e.clientX!==undefined){ lastX=e.clientX; lastY=e.clientY; }
        if(!dragged){
          p.o = p.o==='/' ? '\\' : '/';
          moves++; hintFlash=null; sTap(); render();
          return;
        }
        const rect = board.getBoundingClientRect();
        const cx = Math.floor((lastX-rect.left)/rect.width*N);
        const cy = Math.floor((lastY-rect.top)/rect.height*N);
        if((cx!==p.x||cy!==p.y) && cellFree(cx,cy)){
          p.x=cx; p.y=cy; moves++; hintFlash=null; sMove();
        }
        render(); // geçersiz bırakışta taş eski yerine döner
      };
      window.addEventListener('pointermove', onMove, {passive:false});
      window.addEventListener('pointerup', finish);
      window.addEventListener('pointercancel', finish);
    });
  });
}

/* ============ bölüm akışı ============ */
function loadLevel(i){
  mode='play'; levelIdx=i; moves=0; won=false; hintsLeft=3; hintFlash=null;
  cur = clone(LEVELS[i]);
  $('lvlLabel').textContent = `Bölüm ${i+1}/${LEVELS.length} · ${LEVELS[i].name}`;
  $('parLabel').textContent = `Hedef: ${LEVELS[i].par}`;
  $('hintLeft').textContent = hintsLeft;
  $('hintBtn').style.display='';
  $('overlay').classList.remove('show');
  setEditorUI(false);
  hintDefaultText();
  renderDots(); render();
}
function hintDefaultText(){
  $('hintText').textContent = levelIdx===8
    ? 'Noktalı çerçeveli ayna taşınabilir: sürükle. Dokununca döner.'
    : (levelIdx===7 ? 'Filtreler ışığı boyar — kristalin rengiyle eşleşmeli.'
    : (levelIdx===6 ? 'Bölücü camlar ışığı ikiye ayırır: biri geçer, biri yansır.'
    : 'Aynalara dokun: yönü değişir.'));
}
function starsFor(m, par){ return m<=par ? 3 : m<=par+2 ? 2 : 1; }

function showWin(){
  if(mode==='test'){
    $('winTitle').textContent='Özel bölüm çalışıyor! ✦';
    $('winStars').innerHTML='';
    $('winText').textContent=`${moves} hamlede tamamlandı.`;
    $('nextBtn').textContent='Editöre Dön';
    $('overlay').classList.add('show');
    return;
  }
  const st = starsFor(moves, LEVELS[levelIdx].par);
  bestStars[levelIdx] = Math.max(bestStars[levelIdx], st);
  saveProgress();
  const last = levelIdx===LEVELS.length-1;
  $('winTitle').textContent = last ? 'Tebrikler! ✦' : 'Bölüm tamamlandı';
  $('winStars').innerHTML = '★★★'.split('').map((s,i)=>`<span class="${i<st?'':'off'}">★</span>`).join('');
  const total = bestStars.reduce((a,b)=>a+b,0);
  $('winText').textContent = last
    ? `Tüm odaları aydınlattın. Toplam yıldız: ${total}/${LEVELS.length*3}`
    : `${moves} hamle (hedef ${LEVELS[levelIdx].par}).`;
  $('nextBtn').textContent = last ? 'Baştan Oyna' : 'Sonraki Bölüm';
  $('overlay').classList.add('show');
  renderDots();
}

function renderDots(){
  const d=$('dots'); d.innerHTML='';
  LEVELS.forEach((L,i)=>{
    const el=document.createElement('div');
    el.className='dot'+(bestStars[i]>0?' done':'')+(i===levelIdx&&mode!=='editor'?' now':'');
    el.textContent = bestStars[i]>0 ? '★'.repeat(0)||(i+1) : (i+1);
    el.title = L.name + (bestStars[i]?` · ${'★'.repeat(bestStars[i])}`:'');
    el.addEventListener('click', ()=>loadLevel(i));
    d.appendChild(el);
  });
}

/* ============ ipucu ============ */
$('hintBtn').addEventListener('click', ()=>{
  if(won || hintsLeft<=0 || mode!=='play') return;
  const idx = cur.pieces.findIndex(p=>{
    if(!p.sol) return false;
    if(typeof p.sol==='string') return p.o!==p.sol;
    return p.x!==p.sol.x || p.y!==p.sol.y || p.o!==p.sol.o;
  });
  if(idx<0){ $('hintText').textContent='Her şey doğru yerde görünüyor — ışığı takip et!'; return; }
  const p = cur.pieces[idx];
  if(typeof p.sol==='string'){ p.o=p.sol; }
  else {
    if(!cellFree(p.sol.x,p.sol.y) && !(p.x===p.sol.x&&p.y===p.sol.y)){ $('hintText').textContent='Hedef hücre dolu — önce yer aç.'; return; }
    p.x=p.sol.x; p.y=p.sol.y; p.o=p.sol.o;
  }
  hintsLeft--; moves+=2; hintFlash=idx;
  $('hintLeft').textContent=hintsLeft;
  $('hintText').textContent='Bir taş yerine oturdu (+2 hamle).';
  sHint(); render();
});

/* ============ editör ============ */
const TOOLS = [
  ['mirror','Ayna'],['mvmirror','Taşınır Ayna'],['splitter','Bölücü'],
  ['fred','Filtre 🔴'],['fblue','Filtre 🔵'],
  ['wall','Duvar'],['emitter','Kaynak'],['crystal','Kristal'],['erase','Sil']
];
function buildToolbar(){
  const tb=$('toolbar'); tb.innerHTML='';
  TOOLS.forEach(([id,label])=>{
    const b=document.createElement('button');
    b.className='tool'+(edTool===id?' sel':''); b.textContent=label;
    b.addEventListener('click',()=>{edTool=id; buildToolbar();});
    tb.appendChild(b);
  });
}
function setEditorUI(on){
  $('toolbar').classList.toggle('show',on);
  $('edActions').classList.toggle('show',on);
}
function enterEditor(){
  mode='editor'; won=false; hintFlash=null;
  cur = edLevel; // canlı referans
  $('lvlLabel').textContent='Editör';
  $('parLabel').textContent='';
  $('hintBtn').style.display='none';
  $('hintText').textContent='Araç seç, hücreye dokun. Aynı hücreye tekrar dokun: yön/renk değişir.';
  setEditorUI(true); buildToolbar(); renderDots(); render();
}
function editorTap(ev){
  const rect = board.getBoundingClientRect();
  const x = Math.floor((ev.clientX-rect.left)/rect.width*N);
  const y = Math.floor((ev.clientY-rect.top)/rect.height*N);
  if(x<0||y<0||x>=N||y>=N) return;
  const c = cellAt(x,y);
  const rm = ()=>{
    edLevel.pieces = edLevel.pieces.filter(p=>!(p.x===x&&p.y===y));
    edLevel.crystals = edLevel.crystals.filter(t=>!(t.x===x&&t.y===y));
    edLevel.walls = edLevel.walls.filter(w=>!(w[0]===x&&w[1]===y));
    if(edLevel.emitter&&edLevel.emitter.x===x&&edLevel.emitter.y===y) edLevel.emitter=null;
  };
  if(edTool==='erase'){ rm(); sMove(); render(); return; }
  if(edTool==='emitter'){
    if(c.type==='emitter'){
      const d=DIR_ORDER; cur.emitter.dir=d[(d.indexOf(cur.emitter.dir)+1)%4];
    } else { rm(); edLevel.emitter={x,y,dir:'R'}; }
  }
  else if(edTool==='crystal'){
    if(c.type==='crystal'){
      const t=edLevel.crystals[c.ci];
      t.c = t.c==='any'?'red':t.c==='red'?'blue':'any';
    } else { rm(); edLevel.crystals.push({x,y,c:'any'}); }
  }
  else if(edTool==='wall'){
    if(c.type!=='wall'){ rm(); edLevel.walls.push([x,y]); }
  }
  else if(edTool==='mirror'||edTool==='mvmirror'){
    if(c.type==='m'){ c.p.o = c.p.o==='/'?'\\':'/'; }
    else { rm(); edLevel.pieces.push({k:'m',x,y,o:'/',mv:edTool==='mvmirror'?1:0,sol:null}); }
  }
  else if(edTool==='splitter'){
    if(c.type==='s'){ c.p.o = c.p.o==='/'?'\\':'/'; }
    else { rm(); edLevel.pieces.push({k:'s',x,y,o:'/',sol:null}); }
  }
  else if(edTool==='fred'||edTool==='fblue'){
    const col = edTool==='fred'?'red':'blue';
    if(c.type==='f'){ c.p.c = c.p.c==='red'?'blue':'red'; }
    else { rm(); edLevel.pieces.push({k:'f',x,y,c:col}); }
  }
  sTap(); render();
}

$('editorBtn').addEventListener('click', enterEditor);
$('backBtn').addEventListener('click', ()=>loadLevel(levelIdx));
$('clearBtn').addEventListener('click', ()=>{
  edLevel={emitter:null,crystals:[],walls:[],pieces:[]}; cur=edLevel; render();
});
$('testBtn').addEventListener('click', ()=>{
  if(!edLevel.emitter || edLevel.crystals.length===0){
    $('hintText').textContent='Test için en az bir kaynak ve bir kristal gerek.'; return;
  }
  mode='test'; moves=0; won=false;
  cur = clone(edLevel);
  $('lvlLabel').textContent='Test · Özel Bölüm';
  $('hintText').textContent='Özel bölümünü oynuyorsun. 🛠️ ile editöre dönebilirsin.';
  setEditorUI(false);
  $('edActions').classList.add('show');
  render();
});
$('exportBtn').addEventListener('click', ()=>{
  $('ioTitle').textContent='Bölüm Kodu — kopyala & sakla';
  $('ioText').value = JSON.stringify(edLevel);
  $('ioLoad').style.display='none'; $('ioCopy').style.display='';
  $('ioOverlay').classList.add('show');
});
$('importBtn').addEventListener('click', ()=>{
  $('ioTitle').textContent='Bölüm Kodu Yapıştır';
  $('ioText').value='';
  $('ioLoad').style.display=''; $('ioCopy').style.display='none';
  $('ioOverlay').classList.add('show');
});
$('ioCopy').addEventListener('click', ()=>{
  $('ioText').select();
  try{ navigator.clipboard.writeText($('ioText').value); $('ioCopy').textContent='Kopyalandı ✓'; setTimeout(()=>$('ioCopy').textContent='Kopyala',1200);}catch(e){ document.execCommand('copy'); }
});
$('ioLoad').addEventListener('click', ()=>{
  try{
    const L = JSON.parse($('ioText').value);
    if(!L.pieces||!L.crystals||!L.walls) throw 0;
    edLevel = L; $('ioOverlay').classList.remove('show'); enterEditor();
  }catch(e){ $('ioTitle').textContent='Kod okunamadı — tekrar dene'; }
});
$('ioClose').addEventListener('click', ()=>$('ioOverlay').classList.remove('show'));

/* ============ genel butonlar ============ */
$('nextBtn').addEventListener('click', ()=>{
  $('overlay').classList.remove('show');
  if(mode==='test'){ enterEditor(); return; }
  loadLevel(levelIdx===LEVELS.length-1 ? 0 : levelIdx+1);
});
$('resetBtn').addEventListener('click', ()=>{
  if(mode==='editor') return;
  if(mode==='test'){ moves=0; won=false; cur=clone(edLevel); render(); return; }
  loadLevel(levelIdx);
});
$('soundBtn').addEventListener('click', ()=>{
  soundOn=!soundOn;
  $('soundBtn').textContent = soundOn?'🔊':'🔇';
});

loadLevel(0);

// PWA: çevrimdışı destek
if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
